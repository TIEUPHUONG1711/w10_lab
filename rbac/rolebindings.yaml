apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alice-developer
  namespace: demo
subjects:
- kind: User
  name: alice
roleRef:
  kind: Role
  name: developer
  apiGroup: rbac.authorization.k8s.io
