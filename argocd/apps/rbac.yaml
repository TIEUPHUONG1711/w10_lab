apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rbac
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/TIEUPHUONG1711/w10_lab.git
    targetRevision: main
    path: rbac

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true